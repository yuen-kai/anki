<div class="speedrun sr-concept" data-side="front">
  <div class="sr-cases">
    <section class="sr-case sr-case--a">
      <h2 class="sr-case__label">Case A</h2>
      <div class="sr-case__body">{{CaseA}}</div>
    </section>
    <section class="sr-case sr-case--b">
      <h2 class="sr-case__label">Case B</h2>
      <div class="sr-case__body">{{CaseB}}</div>
    </section>
  </div>

  <p class="sr-prompt">{{SimilarityPrompt}}</p>

  <label class="sr-answer__label" for="sr-similarity">What's the shared underlying concept?</label>
  <textarea id="sr-similarity" class="sr-answer__input" rows="3"
            autocomplete="off" autocapitalize="sentences" spellcheck="false"
            placeholder="State the principle both cases share, then reveal."></textarea>
</div>
