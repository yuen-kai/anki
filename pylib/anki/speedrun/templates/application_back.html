<div class="speedrun sr-app sr-app--answer" data-side="back">
  <nav class="sr-breadcrumb" id="sr-breadcrumb" aria-label="Topic" hidden></nav>

  <div class="sr-problem">{{Problem}}</div>

  <ol class="sr-trail sr-trail--final" id="sr-trail" aria-label="Path taken"></ol>

  <hr id="answer" class="sr-rule">

  <h2 class="sr-reveal__label">Worked solution</h2>
  <div class="sr-solution">{{Solution}}</div>

  <script type="application/json" id="sr-steps">{{Steps}}</script>
  <script type="application/json" id="sr-path">{{CorrectPath}}</script>
</div>
